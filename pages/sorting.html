<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sorting Visualizer</title>

<link rel="stylesheet"
href="../css/style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- BACKGROUND -->

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<i class="fa-solid fa-arrow-down-wide-short"></i>

<span>

Sorting Visualizer

</span>

</div>

<div class="nav-right">

<div class="search-box">

<input type="number"
id="sortValue"
placeholder="(optional input)">

</div>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>

Sorting

<span>

Algorithms

</span>

</h1>

<p>

Visualize Bubble Sort step by step
with animated swaps and comparisons.

</p>

</section>

<!-- CONTROL PANEL -->

<section class="control-panel">

<button onclick="generateArray()">

<i class="fa-solid fa-dice"></i>

Generate

</button>

<button onclick="bubbleSort()">

<i class="fa-solid fa-play"></i>

Bubble Sort

</button>

<button onclick="resetArray()">

<i class="fa-solid fa-broom"></i>

Reset

</button>

</section>

<!-- STATUS -->

<div class="status" id="status">

Sorting Ready...

</div>

<!-- VISUALIZER -->

<section class="visualizer">

<div id="sortContainer" class="sort-container"></div>

</section>

<!-- COMPLEXITY -->

<section class="complexity">

<h2>Bubble Sort Complexity</h2>

<table>

<tr>
<th>Best</th>
<th>Average</th>
<th>Worst</th>
</tr>

<tr>
<td>O(n)</td>
<td>O(n²)</td>
<td>O(n²)</td>
</tr>

</table>

</section>

<!-- CODE BOX -->

<section class="code-box">

<pre id="codeDisplay">

Select sorting algorithm...

</pre>

</section>

<!-- SCRIPT -->

<script src="../js/sorting.js"></script>

</body>

</html>
